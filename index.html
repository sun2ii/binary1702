<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary 1702</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #FAF9F7;
            color: #2D2D2D;
        }
        main {
            text-align: center;
            max-width: 800px;
            padding: 3rem 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: #2D2D2D;
        }
        p {
            font-size: 1.375rem;
            color: #2D2D2D;
            margin-bottom: 3rem;
            line-height: 1.6;
            font-weight: 400;
        }
        button {
            background: #6B8F71;
            color: #FAF9F7;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.125rem;
            font-weight: 500;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        button:hover {
            background: #5A7A60;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1.125rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Everything is Simple, Finally.</h1>
        <p>The single-system setup for teams that want less chaos and real relief.</p>
        <button onclick="alert('Coming soon')">Let's talk</button>
    </main>
</body>
</html>
